<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>ShopMate LK Offline</title>
    <style>
      :root {
        color: #17212b;
        background: #f3f7f9;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid #dfe5ee;
        border-radius: 8px;
        padding: 24px;
        background: #ffffff;
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
      }

      .mark {
        display: grid;
        width: 52px;
        height: 52px;
        margin-bottom: 18px;
        place-items: center;
        border-radius: 8px;
        color: #18324a;
        background: #f6c85f;
        font-weight: 850;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">SM</div>
      <h1>ShopMate LK is offline</h1>
      <p>You are offline. Some features may not work until the internet connection is restored.</p>
    </main>
  </body>
</html>
